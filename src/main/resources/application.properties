spring.application.name=pursuitly

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.hikari.connection-init-sql=SET search_path TO public

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

jsearch.api.key=${JSEARCH_API_KEY}
jsearch.api.host=jsearch.p.rapidapi.com
jsearch.api.url=https://jsearch.p.rapidapi.com/search

adzuna.api.id=${ADZUNA_API_ID}
adzuna.api.key=${ADZUNA_API_KEY}
adzuna.api.url=https://api.adzuna.com/v1/api/jobs/us/search/1

usajobs.api.url=https://data.usajobs.gov/api/search
usajobs.api.email=${USAJOBS_API_EMAIL}
usajobs.api.key=${USAJOBS_API_KEY}

supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=resumes

openai.api.key=${OPENAI_API_KEY}